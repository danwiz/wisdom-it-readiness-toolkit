name: Supply Chain Evidence

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: supply-chain-evidence-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install build and test tools
        run: python -m pip install --upgrade pip build

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Build source and wheel distributions
        run: python -m build

      - name: Generate release checksums
        run: sha256sum dist/* | tee dist/SHA256SUMS.txt

      - name: Generate SPDX JSON SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/wisdom-it-readiness-toolkit-sbom.spdx.json
          artifact-name: wisdom-it-readiness-toolkit-sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest release artifacts and evidence
        uses: actions/attest@v4
        with:
          subject-path: 'dist/*'

      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-evidence-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
