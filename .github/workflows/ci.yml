name: Toolkit CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install .
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Score synthetic assessment through installed CLI
        run: witrt score assessments/quick-check-v0.1.json examples/synthetic-responses.json
      - name: Generate example report through installed CLI
        run: |
          witrt report assessments/quick-check-v0.1.json examples/synthetic-responses.json \
            --subject "Synthetic Demonstration" \
            --data-note "Synthetic demonstration only" \
            --output build/example-report.md
          test -s build/example-report.md
          grep -q "Overall score" build/example-report.md
          grep -q "Priority actions" build/example-report.md
      - uses: actions/upload-artifact@v4
        with:
          name: example-readiness-report
          path: build/example-report.md
